<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KennyPlan">
<link rel="manifest" href="manifest.json">
<title>KennyPlan ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --bob: #FF6B9D; --bob-light: #FFE0ED; --bob-dark: #C94F7C;
  --andrew: #4ECDC4; --andrew-light: #D4F5F3; --andrew-dark: #2A9E96;
  --tarren: #FFB347; --tarren-light: #FFF0D4; --tarren-dark: #CC8A2A;
  --bg: #0F0F1A; --surface: #1A1A2E; --surface2: #252540; --surface3: #32325A;
  --text: #F0F0FF; --text2: #A0A0C0; --text3: #606090;
  --kid-color: #FF6B9D;
  --r: 16px; --r-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden}

/* HEADER */
.header{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Fredoka One',cursive;font-size:26px;color:var(--text)}
.logo span{color:var(--kid-color)}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:none;color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* KID TABS */
.kid-tabs{display:flex;gap:7px;padding:0 18px 10px;flex-shrink:0}
.kid-tab{flex:1;padding:9px 6px;border-radius:var(--r-sm);border:2px solid transparent;background:var(--surface2);color:var(--text2);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.kid-tab .tn{display:block;font-size:14px}
.kid-tab .ta{display:block;font-size:10px;opacity:.7}
.kid-tab.active{color:#fff}
.kid-tab.bob.active{background:var(--bob);border-color:var(--bob)}
.kid-tab.andrew.active{background:var(--andrew);border-color:var(--andrew)}
.kid-tab.tarren.active{background:var(--tarren);border-color:var(--tarren);color:#1a1a2e}

/* DAY PILLS */
.day-row{display:flex;gap:6px;padding:0 18px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.day-row::-webkit-scrollbar{display:none}
.day-pill{padding:6px 14px;border-radius:999px;border:1.5px solid var(--surface3);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;font-family:'Nunito',sans-serif}
.day-pill.active{background:var(--kid-color);border-color:var(--kid-color);color:#fff}
.day-pill.tarren-on{color:#1a1a2e}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--surface3);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:9px 4px 7px;border:none;background:transparent;color:var(--text3);font-size:9px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;letter-spacing:.4px;text-transform:uppercase}
.nav-btn .ni{font-size:20px}
.nav-btn.active{color:var(--kid-color)}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;padding:0 18px 20px;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* PROGRESS */
.prog-section{margin-bottom:12px}
.prog-header{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-label{font-size:12px;color:var(--text2);font-weight:700}
.prog-count{font-size:12px;font-weight:900;color:var(--kid-color)}
.prog-bar{height:7px;background:var(--surface2);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:var(--kid-color);border-radius:999px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* TASKS */
.tasks-list{display:flex;flex-direction:column;gap:8px}
.task-item{background:var(--surface);border-radius:var(--r-sm);padding:11px 13px;display:flex;align-items:flex-start;gap:11px;border:1px solid var(--surface3);cursor:pointer;transition:opacity .2s}
.task-item.done{opacity:.45}
.task-check{width:23px;height:23px;border-radius:50%;border:2px solid var(--surface3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.task-item.done .task-check{background:var(--kid-color);border-color:var(--kid-color)}
.chk{display:none;width:9px;height:5px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-item.done .chk{display:block}
.task-body{flex:1}
.task-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35}
.task-item.done .task-name{text-decoration:line-through;color:var(--text3)}
.task-time{font-size:11px;color:var(--text3);margin-top:2px}
.task-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;margin-top:4px;font-weight:700}
.tag-routine{background:#1e2a4a;color:#7fa8ff}
.tag-school{background:#1a3028;color:#6fcf97}
.tag-activity{background:#2a1a3a;color:#bb86fc}
.tag-hw{background:#3a2a1a;color:#ffc069}
.tag-submit{background:#3a1a1a;color:#ff7875}
.tag-online{background:#2a1833;color:#f5a0c5}

/* BANNERS */
.banner{background:var(--surface2);border:1px solid;border-radius:var(--r-sm);padding:9px 13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.banner-grandma{border-color:var(--tarren-dark);color:var(--tarren)}

/* SECTION LABEL */
.slabel{font-size:10px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin:14px 0 8px}

/* DASHBOARD */
.dash-card{background:var(--surface);border-radius:var(--r);padding:14px;border:1px solid var(--surface3);margin-bottom:10px}
.dash-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dash-name{font-family:'Fredoka One',cursive;font-size:19px}
.dash-name.bob{color:var(--bob)}.dash-name.andrew{color:var(--andrew)}.dash-name.tarren{color:var(--tarren)}
.dash-meta{font-size:11px;font-weight:800;color:var(--text3)}
.dash-bar{height:5px;background:var(--surface2);border-radius:999px;overflow:hidden;margin-bottom:8px}
.dash-fill{height:100%;border-radius:999px;transition:width .4s}
.dash-fill.bob{background:var(--bob)}.dash-fill.andrew{background:var(--andrew)}.dash-fill.tarren{background:var(--tarren)}
.day-dots{display:flex;gap:4px}
.day-dot{flex:1;background:var(--surface2);border-radius:6px;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.day-dot-label{font-size:8px;font-weight:900;color:var(--text3);text-transform:uppercase}
.day-dot-bar{width:22px;height:3px;background:var(--surface3);border-radius:999px;overflow:hidden}
.day-dot-fill{height:100%;border-radius:999px}
.day-dot-fill.bob{background:var(--bob)}.day-dot-fill.andrew{background:var(--andrew)}.day-dot-fill.tarren{background:var(--tarren)}

/* PAST WEEKS */
.past-week-card{background:var(--surface2);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:7px;border:1px solid var(--surface3)}
.past-week-label{font-size:11px;font-weight:900;color:var(--text2);display:block;margin-bottom:8px}
.past-kid-bars{display:flex;flex-direction:column;gap:5px}
.past-kid-row{display:flex;align-items:center;gap:8px}
.past-kid-name{font-size:10px;font-weight:800;width:28px;flex-shrink:0}
.past-kid-name.bob{color:var(--bob)}.past-kid-name.andrew{color:var(--andrew)}.past-kid-name.tarren{color:var(--tarren)}
.past-bar{flex:1;height:5px;background:var(--surface3);border-radius:999px;overflow:hidden}
.past-bar-fill{height:100%;border-radius:999px}
.past-bar-fill.bob{background:var(--bob)}.past-bar-fill.andrew{background:var(--andrew)}.past-bar-fill.tarren{background:var(--tarren)}
.past-pct{font-size:10px;font-weight:900;color:var(--text3);width:30px;text-align:right;flex-shrink:0}

/* WEEKEND */
.wknd-card{background:var(--surface);border-radius:var(--r);padding:14px;border:1px solid var(--surface3);margin-bottom:10px}
.wknd-day{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px}
.wknd-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--surface2)}
.wknd-item:last-child{border-bottom:none}
.wknd-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.wknd-dot.bob{background:var(--bob)}.wknd-dot.andrew{background:var(--andrew)}.wknd-dot.tarren{background:var(--tarren)}
.wknd-name{font-size:13px;font-weight:700;color:var(--text)}
.wknd-detail{font-size:11px;color:var(--text3);margin-top:1px}

/* SPELLINGS */
.spell-section{margin-bottom:20px}
.spell-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.spell-kid-name{font-family:'Fredoka One',cursive;font-size:18px}
.spell-kid-name.bob{color:var(--bob)}.spell-kid-name.andrew{color:var(--andrew)}.spell-kid-name.tarren{color:var(--tarren)}
.spell-last{font-size:11px;font-weight:800;color:var(--text3)}
.spell-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.spell-word{background:var(--surface2);border-radius:var(--r-sm);padding:9px 11px;display:flex;align-items:center;justify-content:space-between;border:1px solid transparent}
.spell-word-text{font-size:13px;font-weight:700;color:var(--text);flex:1}
.spell-del{font-size:16px;color:var(--text3);cursor:pointer;padding:0 2px;line-height:1}
.add-row{display:flex;gap:6px;margin-bottom:8px}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;outline:none}
.add-input:focus{border-color:var(--kid-color)}
.add-btn{padding:10px 14px;border-radius:var(--r-sm);border:none;background:var(--surface3);color:var(--text2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.spell-actions{display:flex;gap:7px}
.spell-btn{flex:1;padding:10px;border-radius:var(--r-sm);border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.spell-btn.game{color:#1a1a2e}
.spell-btn.game.bob{background:var(--bob)}.spell-btn.game.andrew{background:var(--andrew)}.spell-btn.game.tarren{background:var(--tarren)}
.spell-btn.clear{background:var(--surface2);color:var(--text2)}
.hist-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface2);font-size:12px;color:var(--text2)}
.hist-score{font-weight:900}.hist-score.good{color:#6fcf97}.hist-score.ok{color:var(--tarren)}.hist-score.bad{color:#ff7875}

/* SCHOOL TEST TRACKER */
.test-tracker{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--r);padding:14px;margin-top:14px}
.test-tracker-title{font-size:11px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:11px}
.test-entry-row{display:flex;gap:7px;margin-bottom:12px;align-items:center}
.test-input{width:54px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--r-sm);padding:9px 8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;outline:none;text-align:center}
.test-input:focus{border-color:var(--kid-color)}
.test-sep{font-size:18px;color:var(--text3);font-weight:900;flex-shrink:0}
.test-add-btn{flex:1;padding:10px 8px;border-radius:var(--r-sm);border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;color:#1a1a2e;white-space:nowrap}
.test-add-btn.andrew{background:var(--andrew)}.test-add-btn.tarren{background:var(--tarren)}
.test-stats{display:flex;gap:7px;margin-bottom:12px}
.test-stat{flex:1;background:var(--surface2);border-radius:var(--r-sm);padding:9px 8px;text-align:center}
.test-stat-val{font-family:'Fredoka One',cursive;font-size:22px}
.test-stat-val.andrew{color:var(--andrew)}.test-stat-val.tarren{color:var(--tarren)}
.test-stat-lbl{font-size:9px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.test-chart{margin-bottom:12px}
.test-chart-bars{display:flex;align-items:flex-end;gap:3px;height:60px;margin-bottom:3px}
.test-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.test-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s}
.test-bar.andrew{background:var(--andrew)}.test-bar.tarren{background:var(--tarren)}
.test-bar-score{font-size:8px;font-weight:900;color:var(--text3)}
.test-chart-dates{display:flex;gap:3px}
.test-chart-date{flex:1;font-size:7px;color:var(--text3);text-align:center;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.test-history-title{font-size:10px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.test-hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--surface2);font-size:12px}
.test-hist-date{color:var(--text2);font-weight:700}
.test-hist-score{font-weight:900}
.test-hist-del{color:var(--text3);cursor:pointer;font-size:16px;padding:0 3px;line-height:1}
.test-empty{font-size:12px;color:var(--text3);padding:6px 0;font-style:italic}

/* GAME MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:22px 20px 40px;max-height:92dvh;overflow-y:auto;transform:translateY(20px);transition:transform .3s}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.close-btn{float:right;background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* GAME UI */
.game-hint{text-align:center;margin:14px 0 4px}
.hint-label{font-size:11px;color:var(--text3);margin-bottom:6px}
.hint-word{font-family:'Fredoka One',cursive;font-size:36px;color:var(--kid-color);letter-spacing:5px;min-height:46px}
.game-answer{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;min-height:50px;margin:12px 0}
.g-slot{width:34px;height:42px;border-bottom:3px solid var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--text);cursor:pointer;transition:border-color .2s}
.g-slot.filled{border-color:var(--kid-color)}
.game-letters{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0 16px}
.g-letter{width:42px;height:42px;border-radius:10px;background:var(--surface2);border:2px solid var(--surface3);color:var(--text);font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;user-select:none}
.g-letter:active{transform:scale(.88)}
.g-letter.used{opacity:.18;pointer-events:none}
.game-btns{display:flex;gap:8px}
.g-btn{flex:1;padding:13px;border-radius:var(--r-sm);border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.g-btn.clear{background:var(--surface2);color:var(--text2)}
.g-btn.go{background:var(--kid-color);color:#fff}
.game-result{text-align:center;padding:16px 0}
.result-icon{font-size:56px;margin-bottom:10px}
.result-msg{font-family:'Fredoka One',cursive;font-size:24px;margin-bottom:6px}
.result-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.score-dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.sdot{width:26px;height:26px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px}
.sdot.ok{background:#27ae60}.sdot.no{background:#e74c3c}

/* CONFETTI */
@keyframes burst{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1.8) rotate(720deg);opacity:0}}
.cpop{position:fixed;pointer-events:none;font-size:18px;animation:burst .65s ease-out forwards;z-index:999}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Kenny<span>Plan</span> ✨</div>
    <button class="icon-btn" onclick="requestNotify()" title="Enable reminders">🔔</button>
  </div>

  <div class="kid-tabs" id="kid-tabs">
    <button class="kid-tab bob active" onclick="setKid('bob',this)"><span class="tn">🌸 Mar</span><span class="ta">age 5</span></button>
    <button class="kid-tab andrew" onclick="setKid('andrew',this)"><span class="tn">🤖 Pat</span><span class="ta">age 9</span></button>
    <button class="kid-tab tarren" onclick="setKid('tarren',this)"><span class="tn">⚡ Fin</span><span class="ta">age 7</span></button>
  </div>

  <div class="day-row" id="day-row">
    <button class="day-pill" onclick="setDay('Monday',this)">Mon</button>
    <button class="day-pill" onclick="setDay('Tuesday',this)">Tue</button>
    <button class="day-pill" onclick="setDay('Wednesday',this)">Wed</button>
    <button class="day-pill" onclick="setDay('Thursday',this)">Thu</button>
    <button class="day-pill" onclick="setDay('Friday',this)">Fri</button>
  </div>

  <div class="page active" id="page-tasks">
    <div class="prog-section">
      <div class="prog-header"><span class="prog-label">Today's tasks</span><span class="prog-count" id="prog-count">0/0</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>

  <div class="page" id="page-dashboard">
    <div class="slabel">This week at a glance</div>
    <div id="dash-grid"></div>
    <div class="slabel">Weekend activities</div>
    <div id="wknd-grid"></div>
    <div class="slabel">Previous weeks</div>
    <div id="past-weeks-grid"></div>
  </div>

  <div class="page" id="page-spellings">
    <div id="spell-container"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-tasks" onclick="goPage('tasks')"><span class="ni">✅</span>Tasks</button>
    <button class="nav-btn" id="nav-dashboard" onclick="goPage('dashboard')"><span class="ni">📊</span>Overview</button>
    <button class="nav-btn" id="nav-spellings" onclick="goPage('spellings')"><span class="ni">📝</span>Spellings</button>
  </nav>
</div>

<!-- GAME MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal-body"></div>
</div>

<script>
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const KD={
  bob:{label:'Mar',emoji:'🌸',color:'#FF6B9D',bedtime:'8pm',grandmaEvery:3,
    days:{
      Monday:[
        {t:'Arrive home — bags in tray, coat & shoes away',tag:'routine',time:'~4:00pm'},
        {t:'Reading — diary signed ⭐ (1/5)',tag:'school',time:'4:00–4:30pm'},
        {t:'Numberbots maths game',tag:'online',time:'4:30–5:00pm'},
        {t:'Dinner',tag:'routine',time:'5:00pm'},
        {t:'Swimming',tag:'activity',time:'5:30–6:00pm (15–20 min drive)'},
        {t:'Wind down — bed by 8pm',tag:'routine',time:'7:30pm+'},
      ],
      Tuesday:[
        {t:'Arrive home — bags in tray, coat & shoes away',tag:'routine',time:'~4:00pm'},
        {t:'Reading — diary signed ⭐ (2/5)',tag:'school',time:'4:00–4:30pm'},
        {t:'Purple homework book',tag:'hw',time:'4:30–5:00pm'},
        {t:'Dinner',tag:'routine',time:'5:00pm'},
        {t:'Wind down — bed by 8pm',tag:'routine',time:'7:30pm+'},
      ],
      Wednesday:[
        {t:'Arrive home — bags in tray, coat & shoes away',tag:'routine',time:'~4:00pm'},
        {t:'Reading — diary signed ⭐ (3/5)',tag:'school',time:'4:00–4:30pm'},

let curKid='bob', curDay='Monday', curPage='tasks';

function getWeekKey(){
  const d=new Date(), day=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
  return mon.toISOString().slice(0,10);
}

function weekLabel(isoKey){
  const d=new Date(isoKey+'T12:00:00');
  return d.getDate()+' '+d.toLocaleString('en-GB',{month:'short'});
}

function freshState(){
  return {wk:getWeekKey(), chk:{}, sp:{bob:[],andrew:[],tarren:[]},
          hist:{bob:[],andrew:[],tarren:[]}, pastWeeks:[], tests:{andrew:[],tarren:[]}};
}

function archiveWeek(s){
  if(!s.wk) return;
  const entry={wk:s.wk, kids:{}};
  ['bob','andrew','tarren'].forEach(kid=>{
    let tot=0,dn=0;
    DAYS.forEach(day=>{
      const tasks=KD[kid].days[day]||[];
      tasks.forEach((_,i)=>{ tot++; if(s.chk&&s.chk[kid+'|'+day+'|'+i]) dn++; });
    });
    entry.kids[kid]=tot?Math.round(dn/tot*100):0;
  });
  if(!s.pastWeeks) s.pastWeeks=[];
  if(!s.pastWeeks.find(p=>p.wk===s.wk)){
    s.pastWeeks.unshift(entry);
    if(s.pastWeeks.length>12) s.pastWeeks=s.pastWeeks.slice(0,12);
  }
}

function load(){
  try{
    const raw=localStorage.getItem('kp4');
    if(!raw) return freshState();
    const s=JSON.parse(raw);
    const wk=getWeekKey();
    if(s.wk && s.wk!==wk){
      // New week — archive the old one, preserve tests & pastWeeks, reset tasks
      archiveWeek(s);
      const f=freshState();
      f.pastWeeks=s.pastWeeks||[];
      f.tests=s.tests||{andrew:[],tarren:[]};
      f.sp=s.sp||{bob:[],andrew:[],tarren:[]};   // keep word lists week-to-week
      localStorage.setItem('kp4',JSON.stringify(f));
      return f;
    }
    // Same week — fill in any missing keys
    if(!s.sp) s.sp={bob:[],andrew:[],tarren:[]};
    if(!s.hist) s.hist={bob:[],andrew:[],tarren:[]};
    if(!s.pastWeeks) s.pastWeeks=[];
    if(!s.tests) s.tests={andrew:[],tarren:[]};
    return s;
  }catch(e){ return freshState(); }
}

function save(){localStorage.setItem('kp4',JSON.stringify(S));}
function tk(kid,day,i){return kid+'|'+day+'|'+i;}

function isGrandma(kid){
  const wn=Math.ceil((new Date()-new Date(new Date().getFullYear(),0,1))/604800000);
  return wn%KD[kid].grandmaEvery===0;
}

function renderTasks(){
  const tasks=KD[curKid].days[curDay]||[];
  let html='';
  if(curDay==='Friday'&&isGrandma(curKid)) html+=`<div class="banner banner-grandma">🏠 Grandma night tonight!</div>`;
  tasks.forEach((t,i)=>{
    const k=tk(curKid,curDay,i), done=!!S.chk[k];
    html+=`<div class="task-item${done?' done':''}" onclick="toggle('${k}',this,${i})">
      <div class="task-check"><div class="chk"></div></div>
      <div class="task-body">
        <div class="task-name">${t.t}</div>
        <div class="task-time">${t.time}</div>
        <span class="task-tag tag-${t.tag}">${t.tag}</span>
      </div></div>`;
  });
  document.getElementById('tasks-list').innerHTML=html;
  updateProg(tasks);
}

function updateProg(tasks){
  if(!tasks) tasks=KD[curKid].days[curDay]||[];
  let done=0; tasks.forEach((_,i)=>{if(S.chk[tk(curKid,curDay,i)]) done++;});
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-count').textContent=done+'/'+tasks.length;
}

function toggle(k,el){
  S.chk[k]=!S.chk[k]; save();
  el.classList.toggle('done');
  if(S.chk[k]) burst(el);
  updateProg();
}

function burst(el){
  const r=el.getBoundingClientRect(), e=['⭐','🎉','✨','🌟','💫'];
  for(let i=0;i<5;i++){
    const c=document.createElement('div'); c.className='cpop';
    c.textContent=e[Math.floor(Math.random()*e.length)];
    c.style.left=(r.left+r.width/2-10+Math.random()*50-25)+'px';
    c.style.top=(r.top-5)+'px';
    document.body.appendChild(c); setTimeout(()=>c.remove(),750);
  }
}

      }).join('')}`:''}

    </div>`;
  });

function buildTestTracker(kid){
  const tests=S.tests[kid]||[];

  // Stats
  let bestPct=null, totalPct=0;
  tests.forEach(t=>{
    const p=Math.round(t.s/t.o*100);
    totalPct+=p;
    if(bestPct===null||p>bestPct) bestPct=p;
  });
  const avgPct=tests.length?Math.round(totalPct/tests.length):null;

  // Mini bar chart (up to last 8 tests)
  const chartTests=tests.slice(-8);
  let chartBars='', chartDates='';
  if(chartTests.length>1){
    chartTests.forEach(t=>{
      const p=Math.round(t.s/t.o*100);
      const barH=Math.max(4,Math.round(p/100*56));
      chartBars+=`<div class="test-bar-wrap">
        <div class="test-bar ${kid}" style="height:${barH}px"></div>
        <span class="test-bar-score">${t.s}/${t.o}</span>
      </div>`;
      chartDates+=`<div class="test-chart-date">${t.d}</div>`;
    });
  }

  // History rows (last 10, newest first)
  let histRows='';
  if(tests.length===0){
    histRows=`<div class="test-empty">No test results yet — log your first one above! 🎉</div>`;
  } else {
    [...tests].reverse().slice(0,10).forEach((t,i)=>{
      const realIdx=tests.length-1-i;
      const p=Math.round(t.s/t.o*100);
      const cls=p>=80?'good':p>=60?'ok':'bad';
      histRows+=`<div class="test-hist-row">
        <span class="test-hist-date">${t.d}</span>
        <span class="test-hist-score hist-score ${cls}">${t.s}/${t.o} &nbsp;(${p}%)</span>
        <span class="test-hist-del" onclick="delTest('${kid}',${realIdx})">×</span>
      </div>`;
    });
  }

  return `<div class="test-tracker">
    <div class="test-tracker-title">🏫 Friday School Spelling Test</div>
    <div class="test-entry-row">
      <input class="test-input" id="ts-${kid}" type="number" min="0" max="30" placeholder="got">
      <span class="test-sep">/</span>
      <input class="test-input" id="to-${kid}" type="number" min="1" max="30" placeholder="of">
      <button class="test-add-btn ${kid}" onclick="addTest('${kid}')">Log result ✏️</button>
    </div>
    ${tests.length>0?`
    <div class="test-stats">
      <div class="test-stat">
        <div class="test-stat-val ${kid}">${avgPct}%</div>
        <div class="test-stat-lbl">Average</div>
      </div>
      <div class="test-stat">
        <div class="test-stat-val ${kid}">${bestPct}%</div>
        <div class="test-stat-lbl">Best</div>
      </div>
      <div class="test-stat">
        <div class="test-stat-val ${kid}">${tests.length}</div>
        <div class="test-stat-lbl">Tests</div>
      </div>
    </div>
    ${chartTests.length>1?`<div class="test-chart">
      <div class="test-chart-bars">${chartBars}</div>
      <div class="test-chart-dates">${chartDates}</div>
    </div>`:''}
    <div class="test-history-title">All results</div>
    `:''}
    <div class="test-history">${histRows}</div>
  </div>`;
}

function addTest(kid){
  const sEl=document.getElementById('ts-'+kid);
  const oEl=document.getElementById('to-'+kid);
  const s=parseInt(sEl.value), o=parseInt(oEl.value);
  if(isNaN(s)||isNaN(o)||o<1||s<0||s>o){
    alert('Please enter a valid score — e.g. 8 in the first box and 10 in the second.');
    return;
  }
  if(!S.tests[kid]) S.tests[kid]=[];
  const d=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  S.tests[kid].push({s,o,d});
  sEl.value=''; oEl.value='';
  save(); renderSpell();
  burst(sEl);
}

function delTest(kid,idx){
  if(confirm('Remove this test result?')){
    S.tests[kid].splice(idx,1);
    save(); renderSpell();
  }
}

function addWord(kid){
  const inp=document.getElementById('si-'+kid);
  const w=inp.value.trim().toLowerCase(); if(!w) return;
  if(!S.sp[kid]) S.sp[kid]=[];
  if(S.sp[kid].length>=10) return;
  if(!S.sp[kid].includes(w)) S.sp[kid].push(w);
  inp.value=''; save(); renderSpell();
}
function delWord(kid,i){S.sp[kid].splice(i,1);save();renderSpell();}
function clrWords(kid){if(confirm('Clear all words for '+KD[kid].label+'?')){S.sp[kid]=[];save();renderSpell();}}

// ─── SPELLING GAME ───────────────────────────────────────────────────────────
let G={};
function startGame(kid){
  const words=[...(S.sp[kid]||[])].sort(()=>Math.random()-.5);
  if(!words.length) return;
  G={kid,words,idx:0,answers:[],cur:[],avail:[]};
  document.documentElement.style.setProperty('--kid-color',KD[kid].color);
  showRound();
  document.getElementById('overlay').classList.add('open');
}

function showRound(){
  const {kid,words,idx}=G;
  if(idx>=words.length){showResult();return;}
  const kd=KD[kid], word=words[idx];
  let letters=word.split('');
  const extras='aeiourstlnmdpcbfgh'.split('').filter(l=>!letters.includes(l));
  const pad=Math.min(4,12-letters.length);
  for(let i=0;i<pad;i++) letters.push(extras[Math.floor(Math.random()*extras.length)]);
  letters.sort(()=>Math.random()-.5);
  G.avail=letters.map((l,i)=>({l,used:false,id:i}));
  G.cur=[];
  const slots=word.split('').map(()=>`<div class="g-slot"></div>`).join('');
  const ltrs=G.avail.map(({l,id})=>`<div class="g-letter" id="gl${id}" onclick="pick(${id},'${l}')">${l.toUpperCase()}</div>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <button class="close-btn" onclick="closeModal()" style="float:right">✕</button>
    <div class="modal-title" style="color:${kd.color}">${kd.emoji} Spell it!</div>
    <div class="modal-sub">Word ${idx+1} of ${words.length} — tap the letters</div>
    <div class="game-hint">
      <div class="hint-label">Unscramble to spell this word:</div>
      <div class="hint-word" id="hint-w" style="color:var(--text3)">${'_ '.repeat(word.length).trim()}</div>
    </div>
    <div class="game-answer" id="g-ans">${slots}</div>
    <div class="game-letters" id="g-ltrs">${ltrs}</div>
    <div class="game-btns">
      <button class="g-btn clear" onclick="clrAns()">Clear</button>
      <button class="g-btn go" onclick="submitAns('${word}')">Check ✓</button>
    </div>
    <div style="text-align:center;margin-top:10px">
      <span style="font-size:11px;color:var(--text3);cursor:pointer" onclick="document.getElementById('hint-w').textContent='${word.toUpperCase()}'">💡 Show hint</span>
    </div>`;
}

function pick(id,l){
  const el=document.getElementById('gl'+id);
  if(!el||el.classList.contains('used')) return;
  G.cur.push({id,l}); el.classList.add('used');
  const slots=document.querySelectorAll('.g-slot');
  const i=G.cur.length-1;
  if(slots[i]){slots[i].textContent=l.toUpperCase();slots[i].classList.add('filled');}
}
function clrAns(){
  G.cur=[];
  document.querySelectorAll('.g-letter').forEach(el=>el.classList.remove('used'));
  document.querySelectorAll('.g-slot').forEach(s=>{s.textContent='';s.classList.remove('filled');});
}
function submitAns(word){
  const ans=G.cur.map(c=>c.l).join('');
  const ok=ans.toLowerCase()===word.toLowerCase();
  G.answers.push(ok); G.idx++;
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;z-index:200;pointer-events:none';
  flash.textContent=ok?'✅':'❌';
  document.body.appendChild(flash);
  setTimeout(()=>{flash.remove();showRound();},600);
}

function showResult(){
  const {kid,words,answers}=G, kd=KD[kid];
  const score=answers.filter(Boolean).length, total=words.length;
  const pct=Math.round(score/total*100);
  if(!S.hist[kid]) S.hist[kid]=[];
  S.hist[kid].push({d:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}),s:score,t:total});
  save();
  const icon=pct===100?'🏆':pct>=80?'🌟':pct>=60?'😊':'💪';
  const msg=pct===100?'Perfect! Amazing! 🏆':pct>=80?'Brilliant work! 🌟':pct>=60?'Good effort! 👍':'Keep practising! 💪';
  const dots=answers.map((a,i)=>`<div class="sdot ${a?'ok':'no'}">${a?'✓':'✗'}</div>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="game-result">
      <div class="result-icon">${icon}</div>
      <div class="result-msg" style="color:${kd.color}">${msg}</div>
      <div class="result-sub">${score} out of ${total} correct!</div>
      <div class="score-dots">${dots}</div>
      <button class="g-btn go" onclick="closeModal()">Done! 🎉</button>
      <br><br>
      <button class="g-btn clear" style="margin-top:8px" onclick="startGame('${kid}')">Play again 🔄</button>
    </div>`;
  if(curPage==='spellings') renderSpell();
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function requestNotify(){
  if(!('Notification' in window)){alert('Notifications not supported on this device.');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      alert('✅ Reminders enabled!\n\nYou\'ll get a nudge at school pickup (3:50pm) and bedtime.');
    } else {
      alert('To enable reminders, allow notifications in your browser settings and try again.');
    }
  });
}

// SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function(){
  const todayIdx=new Date().getDay()-1;
  const pills=document.querySelectorAll('.day-pill');
  if(todayIdx>=0&&todayIdx<=4){
    pills.forEach((p,i)=>p.classList.toggle('active',i===todayIdx));
    curDay=DAYS[todayIdx];
  } else {
    pills[0].classList.add('active');
  }
  document.documentElement.style.setProperty('--kid-color',KD[curKid].color);
  renderTasks();
})();
</script>
